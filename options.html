<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuration - DeepCheck Voice</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 500px;
        width: 100%;
      }

      h1 {
        font-size: 28px;
        font-weight: 600;
        color: #667eea;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
      }

      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        font-size: 14px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        transition: all 0.2s ease;
        font-family: monospace;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 6px;
      }

      .hint a {
        color: #667eea;
        text-decoration: none;
      }

      .hint a:hover {
        text-decoration: underline;
      }

      button {
        width: 100%;
        padding: 14px 20px;
        font-size: 15px;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: #667eea;
        color: #fff;
      }

      button:hover {
        background: #5568d3;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      .status {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .status.show {
        opacity: 1;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .toggle-visibility {
        margin-top: 8px;
        font-size: 13px;
        color: #667eea;
        cursor: pointer;
        user-select: none;
      }

      .toggle-visibility:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚙️ Configuration</h1>
      <p class="subtitle">Configurez votre clé API OpenAI</p>

      <form id="configForm">
        <div class="form-group">
          <label for="apiKey">Clé API OpenAI</label>
          <input
            type="password"
            id="apiKey"
            placeholder="sk-..."
            autocomplete="off"
            required
          />
          <div class="toggle-visibility" id="toggleVisibility">
            👁️ Afficher la clé
          </div>
          <p class="hint">
            Obtenez votre clé sur
            <a
              href="https://platform.openai.com/api-keys"
              target="_blank"
              rel="noopener noreferrer"
              >platform.openai.com/api-keys</a
            >
          </p>
        </div>

        <button type="submit">Enregistrer</button>

        <div class="status" id="status"></div>
      </form>
    </div>

    <script src="options.js"></script>
  </body>
</html>
