<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Microphone capsule (large, centered) -->
  <rect x="44" y="10" width="40" height="68" rx="20" ry="20" fill="#2563eb"/>

  <!-- Mic stand arc -->
  <path d="M 22 60 Q 22 96 64 96 Q 106 96 106 60"
        stroke="#2563eb" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Mic stem -->
  <line x1="64" y1="96" x2="64" y2="116" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>

  <!-- Mic base -->
  <line x1="42" y1="118" x2="86" y2="118" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>

  <!-- Recording pulse dot -->
  <circle cx="98" cy="20" r="14" fill="#ef4444"/>
  <circle cx="98" cy="20" r="14" fill="none" stroke="#ffffff" stroke-width="3"/>
</svg>
